<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Limrychun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
      top: 50%;
      transform: translateY(-50%);
      width: 90%;
      max-width: 400px;
      margin: auto;
    }

    .logo {
      width: 100px;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .link-btn {
      display: block;
      background: #334155;
      color: white;
      text-decoration: none;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      transition: 0.3s;
      font-weight: bold;
    }

    .link-btn:hover {
      background: #475569;
      transform: scale(1.05);
    }

    /* Sakura animation */
    .sakura {
      position: fixed;
      top: -10px;
      color: pink;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10px) translateX(0) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) translateX(50px) rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Sakura petals -->
  <script>
    for (let i = 0; i < 25; i++) {
      let sakura = document.createElement("div");
      sakura.innerHTML = "🌸";
      sakura.classList.add("sakura");

      sakura.style.left = Math.random() * 100 + "vw";
      sakura.style.animationDuration = (5 + Math.random() * 5) + "s";
      sakura.style.fontSize = (12 + Math.random() * 20) + "px";

      document.body.appendChild(sakura);
    }
  </script>

  <div class="container">

    <!-- Logo Sakura -->
    <img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" class="logo">

    <h1>Limrychun</h1>

    <a class="link-btn" href="https://my-site-3zhj99ot-royyuki21.wix-vibe-site.com/home" target="_blank">
      🌐 Website
    </a>

    <a class="link-btn" href="https://www.threads.com/@lim_rychun" target="_blank">
      🧵 Threads
    </a>

    <a class="link-btn" href="https://www.linkedin.com/in/royyanto-?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank">
      💼 LinkedIn
    </a>

  </div>

</body>
</html>
