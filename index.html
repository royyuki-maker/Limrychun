<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Limrychun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  height: 100vh;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 400px;
  padding-top: 80px;
  z-index: 2;
}

h2 {
  opacity: 0.8;
}

.link-btn {
  display: block;
  background: #334155;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* 🌸 Sakura container */
.sakura {
  position: fixed;
  top: -20px;
  width: 20px;
  height: 20px;
  pointer-events: none;
  animation: fall linear infinite;
}

/* Animasi jatuh + goyang */
@keyframes fall {
  0% {
    transform: translateY(-10px) translateX(0) rotate(0deg);
  }
  50% {
    transform: translateY(50vh) translateX(30px) rotate(180deg);
  }
  100% {
    transform: translateY(100vh) translateX(-30px) rotate(360deg);
  }
}

svg {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 40; i++) {
  let sakura = document.createElement("div");
  sakura.classList.add("sakura");

  sakura.style.left = Math.random() * 100 + "vw";
  sakura.style.animationDuration = (6 + Math.random() * 6) + "s";
  sakura.style.opacity = Math.random();

  // ukuran random
  sakura.style.transform = `scale(${Math.random() * 0.7 + 0.4})`;

  // 🌸 SVG Sakura (REAL SHAPE)
  sakura.innerHTML = `
  <svg viewBox="0 0 100 100">
    <path fill="#ff9bb3" d="
      M50 15
      C60 0, 80 0, 75 25
      C100 20, 100 40, 80 50
      C100 60, 100 80, 75 75
      C80 100, 60 100, 50 85
      C40 100, 20 100, 25 75
      C0 80, 0 60, 20 50
      C0 40, 0 20, 25 25
      C20 0, 40 0, 50 15
      Z"/>
    <circle cx="50" cy="50" r="8" fill="#ffd166"/>
  </svg>
  `;

  document.body.appendChild(sakura);
}
</script>

<div class="container">
  <h2>Welcome to</h2>
  <h1>Limrychun</h1>

  <a class="link
