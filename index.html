<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Limrychun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
      padding-top: 80px;
      z-index: 2;
    }

    h2 {
      font-weight: normal;
      opacity: 0.8;
      margin-bottom: 5px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
      animation: fadeIn 2s ease;
    }

    .link-btn {
      display: block;
      background: #334155;
      color: white;
      text-decoration: none;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      transition: 0.3s;
      font-weight: bold;
      animation: fadeIn 2.5s ease;
    }

    .link-btn:hover {
      background: #475569;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 🌸 Sakura Flower */
    .sakura {
      position: fixed;
      top: -10px;
      width: 16px;
      height: 16px;

      background: radial-gradient(circle at 30% 30%, #ffd1dc, #ff8fab);
      opacity: 0.9;

      /* Bentuk kelopak sakura */
      clip-path: polygon(
        50% 0%,
        65% 20%,
        100% 25%,
        75% 50%,
        100% 75%,
        65% 80%,
        50% 100%,
        35% 80%,
        0% 75%,
        25% 50%,
        0% 25%,
        35% 20%
      );

      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10px) translateX(0) rotate(0deg);
      }
      100% {
        transform: translateY(100vh) translateX(80px) rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <!-- 🌸 Sakura Generator -->
  <script>
    for (let i = 0; i < 30; i++) {
      let sakura = document.createElement("div");
      sakura.classList.add("sakura");

      sakura.style.left = Math.random() * 100 + "vw";
      sakura.style.animationDuration = (5 + Math.random() * 5) + "s";
      sakura.style.opacity = Math.random();

      // ukuran random biar natural
      sakura.style.transform = `scale(${Math.random() * 0.8 + 0.5})`;

      document.body.appendChild(sakura);
    }
  </script>

  <div class="container">
    <h2>Welcome to</h2>
    <h1>Limrychun</h1>

    <a class="link-btn" href="https://my-site-3zhj99ot-royyuki21.wix-vibe-site.com/home" target="_blank">
      🌐 Website
    </a>

    <a class="link-btn" href="https://www.threads.com/@lim_rychun" target="_blank">
      🧵 Threads
    </a>

    <a class="link-btn" href="https://www.linkedin.com/in/royyanto-?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank">
      💼 LinkedIn
    </a>

  </div>

</body>
</html>
