<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Limrychun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  /* 🌌 Background futuristik */
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617 80%);
  color: white;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  height: 100vh;
}

/* 🔲 Grid cyber */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
}

/* ✨ Glow animasi */
body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,255,0.08), transparent 70%);
  animation: moveGlow 15s linear infinite;
  z-index: 0;
}

@keyframes moveGlow {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

.container {
  text-align: center;
  width: 90%;
  max-width: 400px;
  padding: 30px;
  margin-top: 80px;
  z-index: 2;

  /* 🧊 Glass effect */
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.2);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,255,255,0.2);
}

h1 {
  font-size: 32px;
  text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
}

h2 {
  opacity: 0.7;
}

.link-btn {
  display: block;
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: bold;

  /* 🔮 Neon button */
  background: rgba(51,65,85,0.4);
  border: 1px solid rgba(0,255,255,0.3);
  backdrop-filter: blur(10px);

  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.link-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
}

/* ✨ Shine effect */
.link-btn::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(0,255,255,0.3), transparent);
  top: 0;
  left: -100%;
  transition: 0.5s;
}

.link-btn:hover::before {
  left: 100%;
}

/* 🌸 Sakura */
.sakura {
  position: fixed;
  top: -20px;
  width: 28px;
  height: 28px;
  pointer-events: none;

  --scale: 1;

  animation: fall linear infinite;
  filter: drop-shadow(0 0 6px rgba(255, 100, 200, 0.8));
}

svg {
  width: 100%;
  height: 100%;
}

/* 🌸 Animasi jatuh */
@keyframes fall {
  0% {
    transform: translateY(-10px) translateX(0) rotate(0deg) scale(var(--scale));
  }
  50
