<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Limrychun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  height: 100vh;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 400px;
  padding-top: 80px;
  z-index: 2;
}

h2 {
  opacity: 0.8;
}

.link-btn {
  display: block;
  background: #334155;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* 🌸 Sakura */
.sakura {
  position: fixed;
  top: -20px;
  width: 28px;
  height: 28px;
  pointer-events: none;

  /* scale pakai variable biar tidak bentrok */
  --scale: 1;

  animation: fall linear infinite;
  filter: drop-shadow(0 0 4px rgba(255, 182, 193, 0.6));
}

svg {
  width: 100%;
  height: 100%;
}

/* ✅ Animasi sudah digabung dengan scale */
@keyframes fall {
  0% {
    transform: translateY(-10px) translateX(0) rotate(0deg) scale(var(--scale));
  }
  50% {
    transform: translateY(50vh) translateX(40px) rotate(180deg) scale(var(--scale));
  }
  100% {
    transform: translateY(100vh) translateX(-40px) rotate(360deg) scale(var(--scale));
  }
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 25; i++) {
  let sakura = document.createElement("div");
  sakura.classList.add("sakura");

  sakura.style.left = Math.random() * 100 + "vw";
  sakura.style.animationDuration = (6 + Math.random() * 5) + "s";
  sakura.style.opacity = Math.random() * 0.7 + 0.3;

  // ✅ pakai variable, bukan transform langsung
  sakura.style.setProperty('--scale', Math.random() * 0.5 + 0.8);

  sakura.innerHTML = `
  <svg viewBox="0 0 100 100">
    <path fill="#ff9bb3" d="
      M50 15
      C60 0, 80 0, 75 25
      C100 20, 100 40, 80 50
      C100 60, 100 80, 75 75
      C80 100, 60 100, 50 85
      C40 100, 20 100, 25 75
      C0 80, 0 60, 20 50
      C0 40, 0 20, 25 25
      C20 0, 40 0, 50 15
      Z"/>
    <circle cx="50" cy="50" r="10" fill="#ffd166"/>
  </svg>
  `;

  document.body.appendChild(sakura);
}
</script>

<div class="container">
  <h2>Welcome to</h2>
  <h1>Limrychun</h1>

  <a class="link-btn" href="https://my-site-3zhj99ot-royyuki21.wix-vibe-site.com/home">🌐 Website</a>
  <a class="link-btn" href="https://www.threads.com/@lim_rychun">🧵 Threads</a>
  <a class="link-btn" href="https://www.linkedin.com">💼 LinkedIn</a>
</div>

</body>
</html>
